name: Markdown Checks

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  detect-changes:
    name: Detect Changed Markdown/Notebook
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.detect.outputs.should_skip }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Ensure we have the actual PR commit
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect .md or .ipynb Changes
        id: detect
        run: |
          git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}
          CHANGED_FILES="$(git diff --name-only --diff-filter=AM HEAD origin/${{ github.base_ref }})"

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -E '\.md$|\.ipynb$'; then
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          fi

  lint-markdown:
    name: Run markdownlint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should_skip == 'false' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Run Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint.jsonc
          globs: |
            **/*.md
            !data/

  locale-check:
    name: Check for locale-coded URLs
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should_skip == 'false' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Detect locale-coded URLs in changed Markdown
        run: |
          # fetch base to compute diff
          git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}
          CHANGED_FILES="$(git diff --name-only --diff-filter=AM HEAD origin/${{ github.base_ref }})"
          echo "$CHANGED_FILES" | grep -E '\.md$' || exit 0
          # Only scan changed markdown files
          echo "Scanning changed markdown files for locale-coded URLs..."
          LOCALES='en-us|en-gb|fr-fr|es-es|de-de|pt-br|zh-cn|zh-tw|ja-jp'
          set -o pipefail
          matches=0
          for f in $(echo "$CHANGED_FILES" | grep -E '\.md$' || true); do
            if grep -E -n "https?://[^)'\"]*($LOCALES)(/|\\b)" "$f"; then
              matches=1
            fi
          done
          if [ "$matches" -eq 1 ]; then
            echo "Locale-coded URLs found. Please use locale-free URLs where possible."
            exit 1
          else
            echo "No locale-coded URLs found in changed markdown."
          fi
